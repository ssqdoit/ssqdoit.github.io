name: Update super image trends

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "super-image-inspiration/scripts/fetch-trends.mjs"
      - ".github/workflows/update-super-image-trends.yml"

permissions:
  contents: write

concurrency:
  group: super-image-trends
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install trend source adapter
        run: npm install --no-save --package-lock=false --ignore-scripts dailyhot-api@2.0.8

      - name: Fetch platform trends
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          USE_LOG_FILE: "false"
          REQUEST_TIMEOUT: "12000"
        run: node super-image-inspiration/scripts/fetch-trends.mjs

      - name: Publish refreshed data
        run: |
          if git diff --quiet -- super-image-inspiration/data/trends.json; then
            echo "Trend data is unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add super-image-inspiration/data/trends.json
          git commit -m "Update super image trends"
          git push
